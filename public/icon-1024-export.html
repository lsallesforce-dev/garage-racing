<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AutoZap App Icon 1024x1024</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #888; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  p { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 8px 16px; border-radius: 8px; font-family: sans-serif; font-size: 13px; }
</style>
</head>
<body>
<p>Tire um screenshot apenas do ícone abaixo (1024×1024px)</p>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" rx="200" fill="#E0130F"/>
  <rect x="0" y="0" width="1024" height="430" rx="0" fill="#E0130F"/>
  <rect x="0" y="0" width="1024" height="380" fill="#E0130F"/>
  <!-- Diagonal shadow -->
  <polygon points="0,360 1024,410 1024,450 0,400" fill="#0D0D0F" opacity="0.3"/>
  <!-- AUTO -->
  <text x="60" y="355"
    font-family="'Barlow Condensed', 'Arial Narrow', sans-serif"
    font-weight="700"
    font-size="260"
    fill="#FAFAF8"
    letter-spacing="50">AUTO</text>
  <!-- ZAP -->
  <text x="20" y="960"
    font-family="'Barlow Condensed', 'Arial Narrow', sans-serif"
    font-weight="900"
    font-size="580"
    fill="#FAFAF8"
    letter-spacing="-20">ZAP</text>
  <!-- Red dot -->
  <circle cx="960" cy="880" r="55" fill="#0D0D0F" opacity="0.5"/>
  <circle cx="960" cy="875" r="50" fill="#FAFAF8"/>
</svg>
</body>
</html>
