<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- Badge background: dark semi-transparent with rounded corners -->
  <rect x="0" y="0" width="200" height="80" rx="10" ry="10" fill="#111111" fill-opacity="0.78"/>

  <!-- Top accent bar -->
  <rect x="16" y="12" width="168" height="3" rx="1.5" fill="#CC0000"/>

  <!-- GARAGE: bold white text, large -->
  <text
    x="100"
    y="42"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="26"
    letter-spacing="6"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="middle"
  >GARAGE</text>

  <!-- RACING: bold red text, smaller, with tracking -->
  <text
    x="100"
    y="62"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="14"
    letter-spacing="9"
    fill="#CC0000"
    text-anchor="middle"
    dominant-baseline="middle"
  >RACING</text>

  <!-- Bottom accent bar -->
  <rect x="16" y="68" width="168" height="2" rx="1" fill="#CC0000" fill-opacity="0.7"/>
</svg>
